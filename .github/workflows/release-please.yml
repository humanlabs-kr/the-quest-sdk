name: release-please

# Analyzes conventional commits on `main` and opens per-package Release PRs
# (version bump + CHANGELOG). Merging a Release PR creates the tag
# (expo-v*, android-v*, ios-v*) that triggers the matching publish workflow.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Mint a short-lived token for the humanlabs deploy bot (GitHub App). Using an
      # App installation token instead of the default GITHUB_TOKEN is what makes the
      # release tags this action pushes actually fire the `publish-*` workflows —
      # GitHub suppresses workflow triggers for GITHUB_TOKEN-created events (recursion
      # guard), but not for App/PAT-created ones. It also lets release-please open PRs
      # when the org disables "Actions may create PRs". Same bot/secrets as the
      # conductor deploy workflows (DEPLOY_BOT_ID / DEPLOY_BOT_SECRET).
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.DEPLOY_BOT_ID }}
          private-key: ${{ secrets.DEPLOY_BOT_SECRET }}
          owner: ${{ github.repository_owner }}
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
